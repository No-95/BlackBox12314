<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BlackBox Setup</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f4f1ea;
        --ink: #1f2933;
        --muted: #6b7280;
        --line: #d6d3cd;
        --brand: #0f4c81;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Segoe UI", system-ui, sans-serif;
        background:
          radial-gradient(circle at top, rgba(15, 76, 129, 0.08), transparent 40%),
          var(--bg);
        color: var(--ink);
      }
      .card {
        width: min(440px, calc(100vw - 32px));
        background: #fff;
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 28px;
        box-shadow: 0 18px 40px rgba(31, 41, 51, 0.08);
      }
      h1 {
        margin: 0 0 8px;
        font-size: 1.5rem;
      }
      p {
        margin: 0 0 20px;
        color: var(--muted);
        line-height: 1.5;
        font-size: 0.95rem;
      }
      label {
        display: block;
        margin: 0 0 6px;
        font-size: 0.8rem;
        font-weight: 600;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      input {
        width: 100%;
        margin-bottom: 14px;
        padding: 12px 14px;
        border: 1px solid var(--line);
        border-radius: 10px;
        font: inherit;
      }
      input:focus {
        outline: 2px solid rgba(15, 76, 129, 0.25);
        border-color: var(--brand);
      }
      button {
        width: 100%;
        border: 0;
        border-radius: 10px;
        padding: 12px 16px;
        background: var(--brand);
        color: #fff;
        font: inherit;
        font-weight: 600;
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }
      .error {
        display: none;
        margin: 0 0 12px;
        padding: 10px 12px;
        border-radius: 8px;
        background: #fef2f2;
        color: #b91c1c;
        font-size: 0.9rem;
      }
      .error.show { display: block; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Connect to BlackBox Server</h1>
      <p>Enter the Ubuntu server URL and API token provided by your admin. The UI stays on this PC; all heavy work runs on the server.</p>
      <div class="error" id="error"></div>
      <form id="setupForm">
        <label for="serverUrl">Server URL</label>
        <input id="serverUrl" type="url" placeholder="https://blackbox.example.com" required />
        <label for="apiToken">API Token</label>
        <input id="apiToken" type="password" placeholder="BLACKBOX_API_TOKEN" required />
        <button type="submit" id="saveBtn">Save &amp; Open BlackBox</button>
      </form>
    </div>
    <script>
      const form = document.getElementById("setupForm");
      const serverUrl = document.getElementById("serverUrl");
      const apiToken = document.getElementById("apiToken");
      const errorEl = document.getElementById("error");
      const saveBtn = document.getElementById("saveBtn");

      function showError(message) {
        errorEl.textContent = message;
        errorEl.classList.add("show");
      }

      async function boot() {
        const config = await window.BlackBoxDesktop.getConfig();
        if (config?.serverUrl) serverUrl.value = config.serverUrl;
        if (config?.apiToken) apiToken.value = config.apiToken;
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        errorEl.classList.remove("show");
        saveBtn.disabled = true;
        try {
          const url = new URL(serverUrl.value.trim());
          if (!["http:", "https:"].includes(url.protocol)) {
            throw new Error("Server URL must start with http:// or https://");
          }
          await window.BlackBoxDesktop.saveConfig({
            serverUrl: url.origin,
            apiToken: apiToken.value.trim()
          });
          await window.BlackBoxDesktop.openApp();
        } catch (error) {
          showError(error.message || "Could not save settings.");
          saveBtn.disabled = false;
        }
      });

      boot();
    </script>
  </body>
</html>
